name: Build APK

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6  # Updated from v4
  
      - name: Set up JDK 21       # Recommended for 2026 projects
        uses: actions/setup-java@v5 # Updated from v4
        with:
          java-version: '21'      # Try 21 if 17 is failing
          distribution: 'temurin'
          cache: gradle
      

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: cp app/build/outputs/apk/debug/app-debug.apk folio.apk

      # Always upload the APK as a workflow artifact (available for 7 days)
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: folio-debug
          path: folio.apk
          retention-days: 7

      # On a tagged release (e.g. v1.0.0), attach the APK to the GitHub Release
      - name: Attach APK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: folio.apk
          name: Folio ${{ github.ref_name }}
          body: |
            ## Install
            1. Download `folio.apk` to your Android device
            2. Open the file and tap **Install** (allow unknown sources if prompted)

            Requires Android 8.0+
