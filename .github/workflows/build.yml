name: Build

on:
  push:
    branches: [main]
    tags: ['v*', 'V*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build release APK + AAB
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Install SDK platform
        run: $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > $GITHUB_WORKSPACE/folio.keystore

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build release APK and AAB
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/folio.keystore
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease bundleRelease --no-daemon --stacktrace

      - name: Collect artifacts
        run: |
          cp $(find . -name "app-release.apk" | head -n 1) folio.apk
          cp $(find . -name "app-release.aab" | head -n 1) folio.aab

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: folio-apk
          path: folio.apk
          retention-days: 7

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: folio-aab
          path: folio.aab
          retention-days: 7

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: |
            folio.apk
            folio.aab
          name: folio ${{ github.ref_name }}
          body: |
            ## Install

            **Direct install (sideload):** download `folio.apk`, open it on your Android device and tap Install.
            **Google Play:** upload `folio.aab` to the Play Console.

            Requires Android 8.0+
