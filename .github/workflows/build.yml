name: Build APK



on:

  push:

    branches: [main]

    tags: ['v*']

  pull_request:

    branches: [main]

  workflow_dispatch:



jobs:

  build:

    name: Build debug APK

    runs-on: ubuntu-latest

    permissions:

      contents: write



    steps:
      - name: Checkout
        uses: actions/checkout@v6
  
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      # Using a wildcard helps find the APK even if the folder structure varies slightly
      - name: Rename APK
        run: cp $(find . -name "app-debug.apk" | head -n 1) folio.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: folio-debug
          path: folio.apk
          retention-days: 7

      - name: Attach APK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: folio.apk
          name: Folio ${{ github.ref_name }}
          body: |
            ## Install
            1. Download `folio.apk`
            2. Requires Android 8.0+
